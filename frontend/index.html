<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Agent Debug Console</title>
    <style>
        /* 仅保留基础排版，确保在手机和电脑上都能看清 */
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; color: #333; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; background: #eee; border: 1px solid #999; }
        button:hover { background: #ddd; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #444; background: #f9f9f9; display: none; }
        .error { color: red; border-color: red !important; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 13px; }
        .status { font-size: 12px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>✈️ Agent 调试控制台</h2>
    <p class="status">目标后端: <code id="api-url">http://localhost:8000</code></p>

    <!-- 输入区域 -->
    <div>
        <label>输入需求:</label>
        <textarea id="userInput" placeholder="例如：3月20号从北京到大理，3天，预算2k"></textarea>
    </div>
    
    <button id="submitBtn">解析意图</button>
    <button id="clearBtn">清空</button>

    <!-- 结果区域 -->
    <div id="result">
        <strong id="resStatus"></strong>
        <pre id="resContent"></pre>
    </div>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const clearBtn = document.getElementById('clearBtn');
        const userInput = document.getElementById('userInput');
        const resultDiv = document.getElementById('result');
        const resStatus = document.getElementById('resStatus');
        const resContent = document.getElementById('resContent');

        // 清空功能
        clearBtn.onclick = () => {
            userInput.value = '';
            resultDiv.style.display = 'none';
        };

        // 提交逻辑
        submitBtn.onclick = async () => {
            const input = userInput.value.trim();
            if (!input) return alert("内容不能为空");

            // UI 状态重置
            resultDiv.style.display = 'block';
            resultDiv.classList.remove('error');
            resStatus.innerText = "⏳ 正在请求中...";
            resContent.innerText = "";

            try {
                const response = await fetch('http://localhost:8000/api/v1/parse-intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_input: input })
                });

                const data = await response.json();

                if (response.ok) {
                    resStatus.innerText = "✅ 响应成功";
                    // 格式化输出 JSON，方便调试
                    resContent.innerText = JSON.stringify(data, null, 2);
                } else {
                    throw new Error(`Server Error: ${response.status}`);
                }
            } catch (err) {
                resultDiv.classList.add('error');
                resStatus.innerText = "❌ 请求失败";
                resContent.innerText = err.message + "\n\n提示：请检查后端 8000 端口是否启动，并确认跨域(CORS)已开启。";
            }
        };
    </script>
</body>
</html>
