name: Docker Integration CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup environment file
      run: |
        cd backend
        cp .env.example .env
        
        # 使用 sed 命令将模板中的占位符替换为真实的 GitHub Secret
        sed -i 's/LLM_API_KEY=.*/LLM_API_KEY=${{ secrets.LLM_API_KEY }}/' .env
        sed -i 's/LLM_API_KEY=.*/LLM_API_KEY=${{ vars.LLM_MODEL_NAME }}/' .env
        sed -i 's/LLM_API_KEY=.*/LLM_API_KEY=${{ vars.LLM_BASE_URL }}/' .env
        cd ..

    - name: Build and run Docker containers
      run: docker compose up --build -d

    - name: Check container status
      run: |
        sleep 5
        docker compose ps
        
    - name: Run tests inside container
      run: docker compose exec -T server pytest

    - name: Dump docker logs on failure
      if: failure()
      run: docker compose logs